server {
    listen 8080;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;
    error_page 404 /not-found/index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = / {
        return 301 /latency$is_args$args;
    }

    location = /aws {
        return 301 /latency$is_args$args;
    }

    location = /aws/ {
        return 301 /latency$is_args$args;
    }

    location ~ ^(.+)/$ {
        return 301 $1$is_args$args;
    }

    location ^~ /assets/data/ {
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, follow" always;
        add_header Cache-Control "no-cache" always;
    }

    location ~* "^/.+-[0-9A-Za-z_]{8}\.(js|css|woff2)$" {
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.(json|xml|txt)$ {
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }

    location ~* \.(png|jpg|jpeg|webp|avif|svg|ico)$ {
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /not-found {
        error_page 404 /not-found/index.html;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex" always;
        add_header Cache-Control "no-cache" always;
        return 404;
    }

    location ~* \.html$ {
        try_files $uri =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }

    location / {
        try_files $uri $uri/index.html =404;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Cache-Control "no-cache" always;
    }

    location = /not-found/index.html {
        internal;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex" always;
        add_header Cache-Control "no-cache" always;
    }
}
