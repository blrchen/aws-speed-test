<button
  type="button"
  class="fixed top-[calc(env(safe-area-inset-top)+1rem)] left-[calc(env(safe-area-inset-left)+1rem)] z-50 -translate-y-16 rounded-lg bg-primary px-3 py-2 text-sm font-semibold text-primary-foreground transition-transform duration-200 ease-out focus-visible:translate-y-0 focus-visible:ring-4 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-surface-base focus-visible:outline-none"
  (click)="focusMainContent()"
>
  Skip to main content
</button>

<!-- Promo Banner -->
@if (!promoBannerDismissed()) {
  <div
    class="relative flex items-center justify-center bg-brand px-10 py-2 text-xs text-white sm:text-sm"
  >
    <a
      href="https://emailwritingai.com"
      target="_blank"
      rel="noopener noreferrer"
      class="flex items-center gap-2 hover:underline"
    >
      <span
        class="rounded-sm border border-white/30 px-1.5 py-0.5 text-[10px] leading-none font-medium tracking-wide uppercase"
        >Ad</span
      >
      <span>Free Email Writing AI Assistant - emailwritingai.com</span>
      <app-lucide-icon name="chevron-right" class="size-4" aria-hidden="true" />
    </a>
    <button
      type="button"
      class="absolute right-2 flex size-6 items-center justify-center rounded-full text-white/70 transition-colors hover:bg-white/20 hover:text-white sm:right-3"
      aria-label="Dismiss banner"
      (click)="promoBannerDismissed.set(true)"
    >
      <app-lucide-icon name="x" class="size-3.5" aria-hidden="true" />
    </button>
  </div>
}

<!-- Application shell layout -->
<div
  class="mx-auto flex min-h-svh w-full bg-surface-base"
  [class.max-w-none]="fullWidthShell()"
  [class.max-w-7xl]="!fullWidthShell()"
>
  <!-- Desktop Sidebar -->
  <nav
    data-desktop-nav
    class="sticky top-0 hidden h-svh w-64 shrink-0 flex-col border-r border-border-soft bg-sidebar lg:flex"
    aria-label="Primary navigation"
  >
    <!-- Sidebar Header -->
    <div class="flex h-14 items-center border-b border-border-soft px-4">
      <a class="flex items-center gap-2 font-bold" [routerLink]="homeLink">
        <app-lucide-icon name="cloud" class="size-5 text-primary" aria-hidden="true" />
        <span class="text-sm">{{ brandLabel }}</span>
      </a>
    </div>

    <!-- Sidebar Navigation -->
    <div class="flex scrollbar-thin flex-1 flex-col overflow-y-auto px-4 py-4">
      <app-nav-groups [navGroups]="navGroups" class="flex flex-col gap-6 text-sm" />
    </div>
  </nav>

  <!-- Main content area -->
  <div class="flex w-full flex-1 flex-col overflow-x-hidden">
    <!-- Header -->
    <header
      class="sticky top-0 z-40 flex h-14 items-center gap-4 border-b border-border-soft bg-surface-base px-4 sm:px-6"
    >
      <!-- Mobile menu button -->
      <button
        #mobileNavButton
        type="button"
        class="icon-button lg:hidden"
        aria-label="Toggle navigation"
        [attr.aria-controls]="mobileNavOpen() ? 'mobile-nav' : null"
        [attr.aria-expanded]="mobileNavOpen()"
        (click)="toggleMobileNav($event)"
      >
        <app-lucide-icon name="menu" class="size-5" aria-hidden="true" />
      </button>

      <!-- Logo (mobile only - desktop shows in sidebar) -->
      <a
        class="flex shrink-0 items-center gap-2 font-bold whitespace-nowrap lg:hidden"
        [routerLink]="homeLink"
      >
        <app-lucide-icon name="cloud" class="size-5 text-primary" aria-hidden="true" />
        <span class="text-sm">{{ brandLabel }}</span>
      </a>

      <div class="flex-1"></div>

      <!-- Right actions -->
      <div class="flex items-center gap-1">
        <app-theme-toggle />
        <a
          class="icon-button relative"
          [href]="githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          [attr.aria-label]="githubAriaLabel"
        >
          <app-lucide-icon name="github" class="size-5" aria-hidden="true" />
          <app-lucide-icon
            name="external-link"
            class="pointer-events-none absolute -top-0.5 -right-0.5 ml-1 size-3"
            aria-hidden="true"
          />
        </a>
      </div>
    </header>

    <!-- Page content -->
    <main
      id="main-content"
      class="relative flex flex-1 flex-col overflow-x-hidden"
      tabindex="-1"
      [attr.aria-busy]="routeLoading.isLoading() ? 'true' : 'false'"
    >
      <router-outlet />

      <app-route-loader />
    </main>

    <!-- Footer -->
    <app-footer />
  </div>
</div>

<!-- Mobile Navigation Overlay -->
@defer (on interaction(mobileNavButton); prefetch on idle) {
  @if (mobileNavOpen()) {
    <app-mobile-nav
      [brandLabel]="brandLabel"
      [homeLink]="homeLink"
      [navGroups]="navGroups"
      (closed)="closeMobileNav($event)"
    />
  }
}
