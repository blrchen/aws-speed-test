@for (group of navGroups(); track group.id; let last = $last) {
  <div class="flex flex-col gap-2">
    @if (group.heading) {
      <div class="flex h-8 shrink-0 items-center px-2 text-xs font-medium text-text-muted">
        {{ group.heading }}
      </div>
    }
    <ul class="m-0 flex list-none flex-col gap-1 p-0">
      @for (item of group.items; track item.routerLink) {
        <li class="w-full">
          <a
            #linkActive="routerLinkActive"
            class="group flex h-8 w-full items-center gap-2 rounded-md px-2 text-sm outline-none focus-visible:ring-2 focus-visible:ring-primary"
            [class]="linkActive.isActive ? activeLinkClasses : inactiveLinkClasses"
            [routerLink]="item.routerLink"
            [routerLinkActive]="[]"
            [routerLinkActiveOptions]="item.activeMatchOptions ?? exactMatchOptions"
            [attr.title]="item.label"
            ariaCurrentWhenActive="page"
            (click)="handleNavLinkClick($event)"
          >
            <app-lucide-icon [name]="item.icon" class="size-4 shrink-0" aria-hidden="true" />
            <span class="min-w-0 truncate">{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </div>
  @if (!last) {
    <div class="mx-2 my-2 h-px bg-border-soft"></div>
  }
}
